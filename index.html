<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<base target="_top">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<title>Lavoie & Co</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2f4a39">
<!-- iOS : permet l'installation plein écran + icône d'accueil -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Lavoie & Co">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root{
    --ink:#17211b; --ink-2:#3f4a42; --muted:#8c948c;
    --bg:#f3f1ea; --card:#fffdf8; --line:#e4e2d8; --line-2:#efece2;
    --sage:#2f4a39; --sage-d:#243a2d; --sage-bg:#e9efe7; --sage-line:#c9d8cd;
    --side:#1f2d24; --side-2:#2a3a30; --side-text:#cdd6ce; --side-muted:#8ea394; --side-active:#33483b;
    --gold:#c08a3e; --gold-soft:#d9b676; --danger:#b5503f;
    --rad:16px; --rad-sm:12px;
    --sh-1:0 1px 3px rgba(23,33,27,.06);
    --sh-2:0 10px 30px rgba(23,33,27,.10);
    --sh-pop:0 20px 54px rgba(23,33,27,.24);
    --safe-b:env(safe-area-inset-bottom);
    --safe-t:env(safe-area-inset-top);
    --nav-w:256px;
    --navbar-h:calc(64px + var(--safe-b));
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,sans-serif;
    font-size:16px;line-height:1.4;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  ::selection{background:var(--sage-bg)}

  /* ---------- SPLASH ---------- */
  #splash{position:fixed;inset:0;z-index:200;background:radial-gradient(125% 100% at 50% 28%,#fdfcf7 0%,#f3f1ea 58%,#eae6da 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;transition:opacity .5s ease,visibility .5s}
  #splash.gone{opacity:0;visibility:hidden}
  .sp-art{width:118px;height:136px;animation:spRise .8s cubic-bezier(.22,1,.36,1) both;filter:drop-shadow(0 10px 24px rgba(69,100,80,.28))}
  .sp-title{font-size:30px;font-weight:700;letter-spacing:-.02em;color:var(--ink);animation:spRise .8s .12s cubic-bezier(.22,1,.36,1) both}
  .sp-title .amp{color:var(--sage);font-weight:600}
  .sp-tag{font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-top:-16px;animation:spRise .8s .22s cubic-bezier(.22,1,.36,1) both}
  .sp-bar{width:120px;height:4px;border-radius:3px;background:var(--line);overflow:hidden;animation:spRise .8s .3s both}
  .sp-bar i{display:block;height:100%;width:40%;background:var(--sage);border-radius:3px;animation:spLoad 1.5s ease-in-out infinite}
  @keyframes spRise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spLoad{0%{transform:translateX(-120%)}100%{transform:translateX(330%)}}
  @keyframes spFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .sp-people{animation:spFloat 3.6s ease-in-out infinite;transform-origin:center}

  /* ---------- Barre latérale ---------- */
  .sidebar{display:none}
  .side-logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;letter-spacing:-.02em;color:#fff;padding:2px 4px 2px}
  .brandmark{width:27px;height:32px;flex-shrink:0;filter:drop-shadow(0 2px 6px rgba(36,58,45,.28))}
  .side-logo .amp{color:var(--gold-soft);font-weight:600}
  .side-tag{font-size:10.5px;color:var(--side-muted);text-transform:uppercase;letter-spacing:.14em;padding:0 6px 18px;font-weight:600}
  .side-new{margin:0 0 20px;width:100%;background:var(--sage);color:#fff;border-radius:12px;padding:12px;font-weight:600;font-size:14.5px;display:flex;align-items:center;justify-content:center;gap:7px;transition:filter .15s,transform .1s}
  .side-new:active{transform:scale(.98)}
  .side-nav{display:flex;flex-direction:column;gap:3px;flex:1}
  .side-item{display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:11px;color:var(--side-text);font-weight:500;font-size:14.5px;cursor:pointer;transition:background .14s,color .14s}
  .side-item svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.9;flex-shrink:0}
  .side-item.on{background:var(--side-active);color:#fff}
  .side-foot{display:flex;align-items:center;gap:8px;padding:12px 8px 4px;border-top:1px solid var(--side-2);font-size:12px;color:var(--side-muted);font-weight:500}
  .sdot{width:7px;height:7px;border-radius:50%;background:#7bbf8a;transition:background .2s}
  .sdot.busy{background:var(--gold);animation:pulse 1s infinite}
  .sdot.offline{background:#c9803f;animation:none}
  @keyframes pulse{50%{opacity:.4}}

  /* ---------- Contenu ---------- */
  .content{min-height:100vh}
  .topbar{position:sticky;top:0;z-index:30;background:var(--bg);padding:calc(11px + var(--safe-t)) 16px 9px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:10px}
  .brand{display:flex;align-items:center;gap:9px}
  .brand .logo{font-weight:700;font-size:20px;letter-spacing:-.02em} .brand .logo .amp{color:var(--sage)}
  .pagetitle{display:none;font-size:21px;font-weight:700;letter-spacing:-.01em}
  .hsub{margin-left:auto;font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.1em;transition:color .2s}

  main{padding:16px 14px 0;max-width:600px;margin:0 auto;padding-bottom:calc(var(--navbar-h) + 24px)}
  .ph{font-size:24px;font-weight:700;letter-spacing:-.03em;margin:0 0 3px;line-height:1.1}
  .psub{color:var(--muted);font-size:13px;margin:0 0 16px;letter-spacing:.01em}

  .panes{display:block}
  .recgrid{display:grid;grid-template-columns:1fr;gap:8px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--rad);padding:11px 13px;margin-bottom:7px;box-shadow:var(--sh-1)}
  .card.tap{transition:transform .12s,box-shadow .15s,border-color .15s} .card.tap:active{transform:scale(.99)}
  .row{display:flex;align-items:center;gap:11px} .grow{flex:1;min-width:0}
  .trunc{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .muted{color:var(--muted)} .small{font-size:12.5px}

  .datechip{display:flex;flex-direction:column;align-items:center;justify-content:center;width:42px;height:42px;border-radius:11px;background:var(--sage-bg);flex-shrink:0;border:1px solid var(--sage-line)}
  .datechip.empty{background:var(--line-2);border-color:var(--line)}
  .datechip .d{font-size:17px;font-weight:700;color:var(--sage-d);line-height:1} .datechip.empty .d{color:var(--muted)}
  .datechip .m{font-size:9px;color:var(--sage);text-transform:uppercase;letter-spacing:.05em;margin-top:1px;font-weight:600} .datechip.empty .m{color:var(--muted)}
  .mealname{font-size:15px;font-weight:600} .cook{font-size:11.5px;color:var(--muted);margin-top:1px}
  .tagrow{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
  .ttag{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--sage-bg);color:var(--sage-d);font-weight:600}
  .xdel{color:#c7cdc8;font-size:20px;padding:2px 5px;line-height:1;cursor:pointer;transition:color .15s} .xdel:active{color:var(--danger)}
  .chev{color:#c7cdc8;font-size:19px}

  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:15px}
  .btn{background:var(--sage);color:#fff;border-radius:12px;padding:13px 18px;font-weight:600;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;font-size:15px;transition:filter .15s,transform .1s,background .15s}
  .btn:active{transform:scale(.985);background:var(--sage-d)}
  .btn.sec{background:#fff;color:var(--ink);border:1px solid var(--line);box-shadow:var(--sh-1)}
  .btn.ghost{background:var(--sage-bg);color:var(--sage-d)}
  .btn.danger{background:#fff;color:var(--danger);border:1px solid var(--line)}
  .btn.sm{padding:9px 14px;font-size:13.5px;width:auto;border-radius:10px}
  .btn[disabled]{opacity:.5;pointer-events:none}

  .fab{position:fixed;bottom:calc(var(--navbar-h) + 16px);right:16px;z-index:40;width:54px;height:54px;border-radius:17px;background:var(--ink);color:#fff;font-size:28px;font-weight:300;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(27,38,32,.28);transition:transform .12s} .fab:active{transform:scale(.93)}

  label{font-size:12px;font-weight:600;color:var(--ink-2);display:block;margin:0 0 5px}
  input,select{font-family:inherit;font-size:16px;width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:11px;background:#fff;color:var(--ink);transition:border-color .15s,box-shadow .15s}
  input:focus,select:focus{outline:none;border-color:var(--sage);box-shadow:0 0 0 3px var(--sage-bg)}
  input::placeholder{color:#b6bdb6}
  .field{margin-bottom:13px}

  .chk{width:23px;height:23px;border-radius:7px;border:2px solid var(--line);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:#fff;transition:all .13s}
  .chk.on{background:var(--sage);border-color:var(--sage);color:#fff}
  .chk svg{width:13px;height:13px}
  .done .mealname,.done .itxt{text-decoration:line-through;color:var(--muted);text-decoration-color:#ccd2cd}

  .rayhd,.grphd{font-size:11px;font-weight:700;color:var(--sage-d);text-transform:uppercase;letter-spacing:.1em;margin:18px 5px 7px;display:flex;align-items:center;gap:9px}
  .rayhd:first-child,.grphd:first-child{margin-top:4px}
  .rayhd .ln,.grphd .ln{flex:1;height:1px;background:var(--line)} .rayhd .ct,.grphd .ct{color:var(--muted);font-weight:500;letter-spacing:0}

  /* épicerie compacte : 3 zones */
  .epi-card{padding:8px 11px}
  .epi-main{display:flex;align-items:center;gap:10px;flex:1;min-width:0;cursor:pointer}
  .epi-qty{font-size:14px;color:var(--ink-2);font-weight:700;white-space:nowrap;cursor:pointer;padding:4px 8px;border-radius:8px;border:1px solid transparent;transition:border-color .15s,background .15s}
  .epi-qty .u{font-weight:500;color:var(--muted);margin-left:2px}
  .epi-qty:hover{border-color:var(--line);background:var(--bg)}
  .epi-qty .qtyin{width:50px;padding:4px 6px;font-size:14px;font-weight:700;text-align:right;border:1px solid var(--sage);border-radius:7px}
  .src{font-size:10.5px;color:var(--muted);margin-top:1px}

  /* ---------- Nav mobile ---------- */
  .mobilenav{position:fixed;bottom:0;left:0;right:0;z-index:30;background:rgba(255,255,255,.96);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:7px 0 max(9px,var(--safe-b))}
  .mobilenav .nv{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;color:var(--muted);font-weight:600;padding:2px 8px;transition:color .15s}
  .mobilenav .nv.on{color:var(--sage-d)}
  .mobilenav .nv svg{width:21px;height:21px;fill:none;stroke:currentColor;stroke-width:1.8} .mobilenav .nv.on svg{stroke-width:2.2}

  .weeknav{display:flex;align-items:center;justify-content:space-between;margin:0 2px 12px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:6px 6px;box-shadow:var(--sh-1)}
  .weeknav .arr{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;color:var(--sage-d);cursor:pointer;transition:background .14s} .weeknav .arr:active{background:var(--sage-bg)}
  .weeknav .lbl{font-weight:600;font-size:13.5px;text-align:center} .weeknav .lbl .sm{display:block;font-size:10.5px;color:var(--muted);font-weight:500}

  .secthd{display:flex;align-items:center;gap:10px;margin:20px 4px 11px} .secthd .t{font-size:15px;font-weight:700} .secthd .ln{flex:1;height:1px;background:var(--line)}

  .filt,.pills{display:flex;gap:7px;overflow-x:auto;padding:1px 2px 12px;-webkit-overflow-scrolling:touch}
  .filt::-webkit-scrollbar,.pills::-webkit-scrollbar{display:none}
  .fchip,.pill{font-size:12.5px;padding:6px 13px;border-radius:30px;background:#fff;border:1px solid var(--line);color:var(--ink-2);white-space:nowrap;font-weight:500;cursor:pointer;transition:all .13s}
  .fchip.on,.pill.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .pill.addp{color:var(--sage-d);border-style:dashed}

  .selbtn{position:sticky;bottom:calc(var(--navbar-h) + 8px);z-index:25;margin-top:6px}

  .overlay{position:fixed;inset:0;background:rgba(27,38,32,.44);z-index:50;display:flex;align-items:flex-end;justify-content:center;animation:fade .18s ease;backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{background:var(--bg);width:100%;max-width:540px;max-height:92vh;overflow-y:auto;border-radius:22px 22px 0 0;padding:8px 18px calc(120px + var(--safe-b));animation:up .26s cubic-bezier(.22,1,.36,1)}
  @keyframes up{from{transform:translateY(38px)}to{transform:translateY(0)}}
  .grab{width:38px;height:4px;background:#d6dad4;border-radius:3px;margin:8px auto 14px}
  .shd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px} .shd .t{font-size:20px;font-weight:700} .shd .x{font-size:25px;color:var(--muted);cursor:pointer;padding:4px;line-height:1}

  .tchip{font-size:13px;padding:8px 14px;border-radius:30px;background:#fff;border:1px solid var(--line);color:var(--ink-2);font-weight:500;cursor:pointer;transition:all .13s;display:inline-flex;align-items:center;gap:6px}
  .tchip.on{background:var(--sage);color:#fff;border-color:var(--sage)}
  .tchips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}

  .ingrow{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:8px}
  .ingrow .top{display:flex;align-items:center;gap:8px;margin-bottom:8px} .ingrow .nm{flex:1;font-weight:600;font-size:14.5px}
  .usel{font-size:15px;padding:11px 12px;width:100%} .ucustom{font-size:15px;padding:10px 12px;width:100%}
  .ingrow .ray{font-size:10.5px;color:var(--sage-d);background:var(--sage-bg);padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
  .ingrow .rm{color:#c7cdc8;font-size:19px;cursor:pointer;padding:0 2px} .ingrow .bot{display:flex;gap:8px} .ingrow .bot input{padding:9px 11px}

  .ac{position:relative}
  .ac-list{position:absolute;left:0;right:0;top:calc(100% + 5px);z-index:60;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh-pop);max-height:min(200px,40vh);overflow-y:auto;padding:5px}
  .ac-item{padding:11px 12px;border-radius:9px;display:flex;align-items:center;gap:10px;cursor:pointer} .ac-item:active{background:var(--sage-bg)} .ac-item .nm{flex:1;font-size:15px} .ac-item .ray{font-size:11px;color:var(--muted)}
  .ac-new{padding:11px 12px;border-radius:9px;display:flex;align-items:center;gap:9px;cursor:pointer;color:var(--sage-d);font-weight:600;border-top:1px solid var(--line-2);margin-top:3px} .ac-new:active{background:var(--sage-bg)} .ac-new svg{width:17px;height:17px}

  .empty{text-align:center;color:var(--muted);padding:40px 24px;font-size:14px;line-height:1.7} .empty .ic{font-size:30px;margin-bottom:9px;opacity:.55}
  .clk{cursor:pointer} .hide{display:none!important}
  /* étapes : édition */
  .stepedit{display:flex;align-items:flex-start;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:7px}
  .stepedit .steptxt{flex:1;font-size:14px;line-height:1.45;padding-top:2px}
  .stepedit .stepacts{display:flex;gap:6px;align-items:center;flex-shrink:0}
  .stepedit .stepup,.stepedit .stepdn{color:var(--muted);font-size:16px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:6px}
  .stepedit .stepup:active,.stepedit .stepdn:active{background:var(--sage-bg)}
  .stepnum{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--sage);color:#fff;font-size:12.5px;font-weight:700;display:flex;align-items:center;justify-content:center}
  /* étapes : affichage détail */
  .steplist{display:flex;flex-direction:column;gap:2px}
  .steprow{display:flex;align-items:flex-start;gap:12px;padding:9px 0;border-bottom:1px solid var(--line-2)}
  .steprow:last-child{border-bottom:none}
  .steprow .stepnum{background:linear-gradient(135deg,#d9b676,#c08a3e);box-shadow:0 1px 3px rgba(192,138,62,.4)}
  .stepbody{flex:1;font-size:14.5px;line-height:1.5;padding-top:1px}
  .dragh{display:none;color:#c7cdc8;font-size:17px;cursor:grab;padding:0 2px}
  .dropday.dragover{border-color:var(--sage);background:var(--sage-bg);box-shadow:0 0 0 3px var(--sage-bg)}
  .dropray.dragover{color:var(--sage-d)} .dropray.dragover .ln{background:var(--sage)}
  .dropray.dragover{background:var(--sage-bg);border-radius:8px;padding-left:6px;padding-right:6px}
  .inggrid{display:grid;grid-template-columns:1fr;gap:6px;margin-bottom:6px}
  .ingcard{padding:9px 12px}
  @media(min-width:680px){ .inggrid{grid-template-columns:1fr 1fr} }
  @media(min-width:1080px){ .inggrid{grid-template-columns:1fr 1fr 1fr} }
  .dragging{opacity:.45}
  @media(min-width:900px){ .dragh{display:inline} [data-dragrec]{cursor:grab} [data-draging]{cursor:grab} }
  .toast{position:fixed;bottom:calc(var(--navbar-h) + 20px);left:50%;transform:translateX(-50%);z-index:80;background:var(--ink);color:#fff;font-size:13.5px;font-weight:500;padding:11px 18px;border-radius:30px;box-shadow:var(--sh-pop);max-width:90%;text-align:center;animation:tin .2s ease} @keyframes tin{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}

  /* ============ DESKTOP ============ */
  @media(min-width:900px){
    .sidebar{display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;width:var(--nav-w);background:var(--side);padding:24px 16px calc(16px + var(--safe-b));z-index:40}
    .mobilenav{display:none}
    .fab{display:none!important}
    .content{margin-left:var(--nav-w)}
    .topbar{padding:20px 36px;background:var(--bg);border-bottom:1px solid var(--line-2)}
    .brand{display:none} .pagetitle{display:block}
    main{max-width:1120px;margin:0 auto;padding:30px 36px 60px}
    .ph{font-size:29px} .psub{font-size:14.5px;margin-bottom:22px}
    .card{padding:14px 16px;margin-bottom:9px} .epi-card{padding:11px 14px}
    .toast{bottom:32px} .selbtn{position:static}
    .panes{display:grid;grid-template-columns:minmax(330px,360px) 1fr;gap:32px;align-items:start}
    .pane-a{position:sticky;top:96px}
    .recgrid{grid-template-columns:1fr 1fr;gap:12px}
    .overlay{align-items:center} .grab{display:none}
    .sheet{border-radius:20px;max-width:560px;min-height:340px;max-height:90vh;padding-bottom:28px;animation:pop .22s cubic-bezier(.22,1,.36,1)}
    .sheet.tall{min-height:520px}
    @keyframes pop{from{transform:scale(.96);opacity:.4}to{transform:scale(1);opacity:1}}
    .sp-art{width:240px;height:192px} .sp-title{font-size:36px}
  }
  @media(min-width:1280px){ .recgrid{grid-template-columns:1fr 1fr 1fr} }
  @media(hover:hover){
    .card.tap:hover{transform:translateY(-2px);box-shadow:var(--sh-2);border-color:var(--sage-line)}
    .side-item:hover{background:var(--side-2);color:#fff}
    .side-new:hover{filter:brightness(1.06)}
    .btn:hover{filter:brightness(1.04)} .btn.sec:hover,.btn.danger:hover{background:var(--sage-bg)}
    .fchip:hover,.pill:hover,.tchip:hover{border-color:var(--sage)}
    .xdel:hover{color:var(--danger)} .ac-item:hover,.ac-new:hover{background:var(--sage-bg)} .weeknav .arr:hover{background:var(--sage-bg)}
  }
</style>
</head>
<body>

<div id="splash">
  <svg class="sp-art" viewBox="0 0 124 148" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Écusson Lavoie & Co">
    <defs>
      <linearGradient id="spShield" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#3c5b48"/><stop offset="0.55" stop-color="#2f4a39"/><stop offset="1" stop-color="#243a2d"/>
      </linearGradient>
      <linearGradient id="spGold" x1="0" y1="0" x2="1" y2="1">

<script>
// ⚙️ URL de ton backend Apps Script (déploiement Web App, finit par /exec)
// À REMPLACER par ton URL réelle une fois le backend redéployé.
var API_URL = 'https://script.google.com/macros/s/AKfycbwJAJddKu42tH8ROtPpNpsRbspXa23cX8MqzoSkZUrXfTTe95QN-Bx-O3flOP4f1L7z/exec';
// Détecte si on tourne en mode "hébergé ailleurs" (GitHub Pages) vs dans l'iframe Apps Script
var HOSTED = location.hostname.indexOf('script.google.com') < 0 && location.hostname.indexOf('googleusercontent') < 0;

var DATA=null, TAB='menu', curListe=null, weekOffset=0;
var MENU_SEL={}, MENU_FILTER='', REC_INGS=[], REC_TYPES={}, REC_STEPS=[], EDIT_RID=null;
var JOURS=['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
var JOURS_C=['DIM','LUN','MAR','MER','JEU','VEN','SAM'];
var MOIS_L=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
var TITLES={menu:'Menu',recettes:'Recettes',epicerie:'Épicerie',ingredients:'Ingrédients',listes:'Listes'};
var CHK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>';
var inflight=0, busyGen=false, splashHidden=false, isOffline=false;
var LOCAL_KEY='LCO_DATA_CACHE_v1';
// Sauvegarde une copie locale des données (pour la lecture offline)
function saveLocal(d){try{localStorage.setItem(LOCAL_KEY,JSON.stringify({t:Date.now(),data:d}));}catch(e){}}
// Récupère la dernière copie locale, ou null
function loadLocal(){try{var raw=localStorage.getItem(LOCAL_KEY);if(!raw)return null;var o=JSON.parse(raw);return o&&o.data?o:null;}catch(e){return null;}}

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function fmtNum(v){return String(v).replace('.',',');}
var UNITES=['unité','g','kg','ml','L','c. à thé','c. à soupe','tasse','pincée','sac','boîte','paquet','pot','conserve','bouteille','lb','douzaine','tranche','gousse'];
// unités invariables (ne prennent pas de s) ou à pluriel spécial
var UNIT_NOPLUR={'g':1,'kg':1,'ml':1,'l':1,'lb':1,'unité':1};
function plurUnite(qte,unite){
  var u=String(unite||'').trim();if(!u)return '';
  var n=parseFloat(String(qte).replace(',','.'))||0;
  if(n<=1)return u;
  var key=u.toLowerCase();
  if(UNIT_NOPLUR[key])return u; // g, kg, ml, L, lb, unité : invariables ou déjà gérés
  if(key==='unité')return 'unités';
  if(/s$/i.test(u))return u; // déjà au pluriel
  if(/x$/i.test(u))return u;
  return u+'s';
}
function qtyHtml(qte,unite){var u=plurUnite(qte,unite);return '<b>'+esc(fmtNum(qte))+'</b>'+(u?' <span class="u">'+esc(u)+'</span>':'');}
// Sélecteur d'unité : liste déroulante + option "Autre…" qui révèle un champ texte
function uniteSelectHtml(idBase,current){
  current=String(current||'').trim();
  var inList=UNITES.some(function(u){return u.toLowerCase()===current.toLowerCase();});
  var opts='<option value=""'+(current===''?' selected':'')+'>—</option>';
  UNITES.forEach(function(u){opts+='<option'+((!('')&&current.toLowerCase()===u.toLowerCase())?' selected':'')+'>'+esc(u)+'</option>';});
  opts+='<option value="__custom__"'+((current!==''&&!inList)?' selected':'')+'>Autre…</option>';
  var customStyle=(current!==''&&!inList)?'':'display:none';
  return '<select class="usel" id="'+idBase+'-sel">'+opts+'</select>'+
         '<input class="ucustom" id="'+idBase+'-cust" placeholder="unité" value="'+(current!==''&&!inList?esc(current):'')+'" style="'+customStyle+';margin-top:6px">';
}
// lit la valeur d'un sélecteur d'unité
function uniteSelectVal(idBase){
  var sel=document.getElementById(idBase+'-sel');if(!sel)return '';
  if(sel.value==='__custom__'){var c=document.getElementById(idBase+'-cust');return c?c.value.trim():'';}
  return sel.value;
}
// branche le comportement "Autre…" d'un sélecteur d'unité
function bindUniteSelect(idBase){
  var sel=document.getElementById(idBase+'-sel'),cust=document.getElementById(idBase+'-cust');
  if(!sel||!cust)return;
  sel.onchange=function(){if(sel.value==='__custom__'){cust.style.display='';cust.focus();}else{cust.style.display='none';}};
}
function isTrue(v){return v===true||String(v).toUpperCase()==='TRUE';}
function qall(s){return Array.prototype.slice.call(document.querySelectorAll(s));}
function cid(p){return p+Date.now().toString(36)+Math.floor(Math.random()*1000).toString(36);}
function norm(s){return String(s==null?'':s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function pad(n){return n<10?'0'+n:''+n;}
function ymd(dt){return dt.getFullYear()+'-'+pad(dt.getMonth()+1)+'-'+pad(dt.getDate());}
function parseYmd(iso){var p=String(iso).split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
function mondayOf(date){var d=new Date(date);var day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);d.setHours(0,0,0,0);return d;}
function weekDates(off){var m=mondayOf(new Date());m.setDate(m.getDate()+off*7);var a=[];for(var i=0;i<7;i++){var d=new Date(m);d.setDate(m.getDate()+i);a.push(d);}return a;}
function recette(rid){return (DATA.recettes||[]).filter(function(x){return String(x.RecetteID)===String(rid);})[0];}
function recetteNom(rid){var r=recette(rid);return r?r.Nom:'(supprimée)';}
function rayonsSorted(){return (DATA.rayons||[]).slice().sort(function(a,b){return a.Ordre-b.Ordre;});}
function catalogue(){return (DATA.catalogue||[]).slice().sort(function(a,b){return String(a.Ingredient).localeCompare(String(b.Ingredient));});}
function souperFor(iso){return (DATA.soupers||[]).filter(function(s){return s.Date===iso;})[0];}
function epiItem(id){return (DATA.epicerie||[]).filter(function(x){return String(x.ListeID)===String(id);})[0];}
function liste(id){return (DATA.listes||[]).filter(function(l){return String(l.ListeID)===String(id);})[0];}
function lastCookedLabel(r){
  var lc=r.lastCooked;if(!lc)return '';
  var today=new Date();today.setHours(0,0,0,0);
  var d=parseYmd(lc);d.setHours(0,0,0,0);
  var days=Math.round((today-d)/86400000);
  if(days<0)return 'prévu bientôt';
  if(days===0)return 'aujourd\'hui';
  if(days===1)return 'hier';
  if(days<7)return 'il y a '+days+' jours';
  if(days<14)return 'il y a 1 semaine';
  if(days<31)return 'il y a '+Math.floor(days/7)+' semaines';
  if(days<60)return 'il y a 1 mois';
  return 'il y a '+Math.floor(days/30)+' mois';
}

function hideSplash(){if(splashHidden)return;splashHidden=true;var s=document.getElementById('splash');if(s){s.classList.add('gone');setTimeout(function(){s.remove();},600);}}

function updateSync(){var busy=inflight>0;var h=document.getElementById('hsub');if(h)h.textContent=isOffline?'Hors ligne':(busy?'Synchronisation…':'Famille Lavoie');var d=document.getElementById('sdot');if(d){d.classList.toggle('busy',busy&&!isOffline);d.classList.toggle('offline',isOffline);}var f=document.getElementById('sfoot');if(f)f.textContent=isOffline?'Hors ligne — consultation':(busy?'Synchronisation…':'Synchronisé');}
// Appel API unifié : fetch si hébergé ailleurs (GitHub Pages), google.script.run si dans l'iframe Apps Script
function apiCall(fn,args){
  if(HOSTED){
    // GET avec params dans l'URL : Safari iOS bloque les POST cross-domain, mais accepte les GET "simples".
    var url=API_URL+'?api='+encodeURIComponent(fn)+'&args='+encodeURIComponent(JSON.stringify(args||[]))+'&t='+Date.now();
    return fetch(url,{method:'GET',redirect:'follow'}).then(function(r){
      return r.text().then(function(txt){
        var j;
        try{j=JSON.parse(txt);}catch(parseErr){
          // la réponse n'est pas du JSON → on montre le début du contenu réel reçu
          throw new Error('Réponse non-JSON ('+r.status+') : '+String(txt).slice(0,120));
        }
        if(!j||!j.ok)throw new Error((j&&j.error)||'Erreur serveur');
        return j.result;
      });
    });
  }
  return new Promise(function(resolve,reject){
    google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[fn].apply(google.script.run,args||[]);
  });
}
function call(fn,args,onSuccess){
  inflight++;updateSync();
  apiCall(fn,args).then(function(res){
    inflight=Math.max(0,inflight-1);
    if(isOffline){isOffline=false;} // le réseau est revenu
    updateSync();
    // si on a une nouvelle copie complète des données en retour, on la garde aussi en local
    if(DATA)saveLocal(DATA);
    if(onSuccess)onSuccess(res);
  }).catch(function(){
    inflight=Math.max(0,inflight-1);
    // Échec = probablement hors ligne. On NE recharge PAS (ça effacerait le changement à l'écran).
    // On prévient que la modif n'est pas encore sauvegardée. (La vraie file de sync = Étape 3.)
    isOffline=true;updateSync();
    toast('Hors ligne — modification non sauvegardée');
  });
}
function toast(msg){var t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove();},300);},2200);}
function load(){
  var t0=Date.now();
  // 1) Affiche immédiatement la copie locale si on en a une (instantané, et base pour l'offline)
  var cached=loadLocal();
  if(cached&&!DATA){DATA=cached.data;render();}
  // 2) Tente de rafraîchir depuis le serveur
  apiCall('getAllData',[]).then(function(d){
    isOffline=false;DATA=d;saveLocal(d);updateSync();render();
    var wait=Math.max(0,1500-(Date.now()-t0));setTimeout(hideSplash,wait);
  }).catch(function(e){
    hideSplash();
    if(DATA){
      // On a des données en cache → mode hors ligne (consultation)
      isOffline=true;updateSync();render();
    } else {
      // DÉBOGAGE : on affiche l'erreur réelle pour comprendre ce qui bloque
      var msg=(e&&e.message)?e.message:String(e);
      document.getElementById('view').innerHTML='<div class="empty"><div class="ic">📡</div><b>Détail technique de l\'erreur :</b><br><br><span style="color:var(--danger);font-size:13px;word-break:break-word">'+esc(msg)+'</span><br><br><span style="font-size:12px">URL appelée :<br>'+esc(API_URL.slice(0,60))+'…</span><br><br><button class="btn sm" onclick="location.reload()" style="margin:0 auto;width:auto">Réessayer</button></div>';
    }
  });
}

var pendEpi={},epiT=null,pendLi={},liT=null;
function flushEpi(){var ks=Object.keys(pendEpi);if(!ks.length)return;var arr=ks.map(function(k){return {id:k,coche:pendEpi[k]};});pendEpi={};call('setEpicerieCochesBatch',[arr]);}
function queueEpi(id,val){pendEpi[id]=val;clearTimeout(epiT);epiT=setTimeout(flushEpi,700);}
function flushLi(){var ks=Object.keys(pendLi);if(!ks.length)return;var arr=ks.map(function(k){return {id:k,coche:pendLi[k]};});pendLi={};call('setListeItemCochesBatch',[arr]);}
function queueLi(id,val){pendLi[id]=val;clearTimeout(liT);liT=setTimeout(flushLi,700);}
window.addEventListener('pagehide',function(){flushEpi();flushLi();});
// Clavier mobile : faire remonter le champ/élément actif pour qu'il reste visible
document.addEventListener('focusin',function(e){
  var t=e.target;
  if(t&&(t.tagName==='INPUT'||t.tagName==='SELECT'||t.tagName==='TEXTAREA')){
    setTimeout(function(){try{t.scrollIntoView({block:'center',behavior:'smooth'});}catch(x){try{t.scrollIntoView();}catch(y){}}},300);
  }
});
document.addEventListener('visibilitychange',function(){if(document.visibilityState==='hidden'){flushEpi();flushLi();}});

function setTab(t){TAB=t;qall('.side-item,.mobilenav .nv').forEach(function(n){n.classList.toggle('on',n.getAttribute('data-tab')===t);});var pt=document.getElementById('pagetitle');if(pt)pt.textContent=TITLES[t]||'';render();}
function render(){if(!DATA)return;flushEpi();flushLi();document.getElementById('fab').classList.toggle('hide',TAB!=='recettes');var v=document.getElementById('view');if(TAB==='menu')v.innerHTML=viewMenu();else if(TAB==='recettes')v.innerHTML=viewRecettes();else if(TAB==='epicerie')v.innerHTML=viewEpicerie();else if(TAB==='ingredients')v.innerHTML=viewIngredients();else if(TAB==='listes')v.innerHTML=viewListes();bind();}

/* ============ MENU ============ */
function viewMenu(){
  var dates=weekDates(weekOffset),m0=dates[0],m6=dates[6];
  var lbl=m0.getDate()+' '+MOIS_L[m0.getMonth()]+' – '+m6.getDate()+' '+MOIS_L[m6.getMonth()];
  var sub=weekOffset===0?'Cette semaine':(weekOffset===1?'Semaine prochaine':(weekOffset===-1?'Semaine dernière':''));
  var h='<div class="ph">Le menu</div><div class="psub">Choisis tes recettes, elles se placent dans la semaine</div><div class="panes"><section class="pane-a">';
  h+='<div class="weeknav"><div class="arr clk" id="wPrev">‹</div><div class="lbl">'+esc(lbl)+(sub?'<span class="sm">'+esc(sub)+'</span>':'')+'</div><div class="arr clk" id="wNext">›</div></div>';
  dates.forEach(function(d){
    var iso=ymd(d),s=souperFor(iso),wd=d.getDay();
    if(s)h+='<div class="card dropday" draggable="true" data-dropday="'+esc(iso)+'" data-dragday="'+esc(iso)+'"><div class="row"><div class="epi-main clk" data-mealday="'+esc(s.RecetteID)+'" style="flex:1;min-width:0"><div class="datechip"><span class="d">'+d.getDate()+'</span><span class="m">'+JOURS_C[wd]+'</span></div><div class="grow"><div class="mealname trunc">'+esc(recetteNom(s.RecetteID))+'</div><div class="cook">'+JOURS[wd]+(s.Cuisinier?' · '+esc(s.Cuisinier):'')+'</div></div></div><span class="dragh">⠿</span><span class="xdel clk" data-delsoup="'+esc(iso)+'">&times;</span></div></div>';
    else h+='<div class="card tap clk dropday" data-dropday="'+esc(iso)+'" data-addday="'+esc(iso)+'"><div class="row"><div class="datechip empty"><span class="d">'+d.getDate()+'</span><span class="m">'+JOURS_C[wd]+'</span></div><div class="grow"><div class="mealname" style="color:var(--muted);font-weight:500">Libre</div><div class="cook">touche pour ajouter</div></div><span class="chev">+</span></div></div>';
  });
  h+='</section><section class="pane-b">';

var ING_SEARCH='';
function viewIngredients(){
  var cat=(DATA.catalogue||[]);
  var h='<div class="ph">Ingrédients</div><div class="psub">'+cat.length+' ingrédients · glisse-les entre rayons pour les reclasser</div>';
  h+='<div style="display:flex;gap:9px;margin-bottom:16px;max-width:600px"><input id="ingSearch" placeholder="Rechercher un ingrédient…" value="'+esc(ING_SEARCH)+'" class="grow"><button class="btn" style="width:auto;padding:12px 18px" id="ingAdd">+ Ajouter</button></div>';
  var nq=norm(ING_SEARCH);
  var ordre=rayonsSorted().map(function(r){return r.Rayon;});
  var byR={},seen={};
  cat.forEach(function(c){if(nq&&norm(c.Ingredient).indexOf(nq)<0)return;(byR[c.Rayon]=byR[c.Rayon]||[]).push(c);});
  function block(ray){
    var items=(byR[ray]||[]).slice().sort(function(a,b){return String(a.Ingredient).localeCompare(String(b.Ingredient));});
    var h='<div class="rayhd dropray" data-dropray="'+esc(ray)+'">'+esc(ray)+'<span class="ln"></span><span class="ct">'+items.length+'</span></div>';
    h+='<div class="inggrid">';
    if(!items.length)h+='<div class="muted small" style="padding:4px 6px">—</div>';
    items.forEach(function(c){
      h+='<div class="card tap epi-card ingcard" draggable="true" data-draging="'+esc(c.Ingredient)+'" data-ingray="'+esc(c.Rayon)+'"><div class="row"><span class="dragh">⠿</span><span class="grow itxt clk" data-ingedit="'+esc(c.Ingredient)+'">'+esc(c.Ingredient)+'</span><span class="xdel clk" data-ingdel="'+esc(c.Ingredient)+'">&times;</span></div></div>';
    });
    h+='</div>';
    return h;
  }
  ordre.forEach(function(ray){seen[ray]=1;h+=block(ray);});
  Object.keys(byR).forEach(function(ray){if(!seen[ray])h+=block(ray);});
  return h;
}

/* ============ BIND ============ */
/* ============ Drag & drop (PC) ============ */
var DRAG=null; // {type:'rec'|'day', id}
function bindDragDrop(){
  qall('[data-dragrec]').forEach(function(el){
    el.addEventListener('dragstart',function(e){DRAG={type:'rec',id:el.getAttribute('data-dragrec')};el.classList.add('dragging');try{e.dataTransfer.effectAllowed='copy';e.dataTransfer.setData('text/plain',DRAG.id);}catch(x){}});
    el.addEventListener('dragend',function(){el.classList.remove('dragging');DRAG=null;qall('.dropday').forEach(function(d){d.classList.remove('dragover');});});
  });
  qall('[data-dragday]').forEach(function(el){
    el.addEventListener('dragstart',function(e){DRAG={type:'day',id:el.getAttribute('data-dragday')};el.classList.add('dragging');try{e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',DRAG.id);}catch(x){}});
    el.addEventListener('dragend',function(){el.classList.remove('dragging');DRAG=null;qall('.dropday').forEach(function(d){d.classList.remove('dragover');});});
  });
  qall('.dropday').forEach(function(el){
    el.addEventListener('dragover',function(e){if(DRAG){e.preventDefault();el.classList.add('dragover');}});
    el.addEventListener('dragleave',function(){el.classList.remove('dragover');});
    el.addEventListener('drop',function(e){
      e.preventDefault();el.classList.remove('dragover');if(!DRAG)return;
      var target=el.getAttribute('data-dropday');
      if(DRAG.type==='rec'){
        var ex=souperFor(target);if(ex){ex.RecetteID=DRAG.id;}else DATA.soupers.push({Date:target,RecetteID:DRAG.id,Cuisinier:''});
        call('setSouper',[target,DRAG.id,'']);render();
      } else if(DRAG.type==='day'){
        var from=DRAG.id;if(from===target){return;}
        var sFrom=souperFor(from),sTarget=souperFor(target);
        var batch=[];
        if(sTarget){ // échange
          var tmpR=sFrom.RecetteID,tmpC=sFrom.Cuisinier;
          sFrom.RecetteID=sTarget.RecetteID;sFrom.Cuisinier=sTarget.Cuisinier;
          sTarget.RecetteID=tmpR;sTarget.Cuisinier=tmpC;
          batch.push({date:from,recetteId:sFrom.RecetteID,cuisinier:sFrom.Cuisinier});
          batch.push({date:target,recetteId:sTarget.RecetteID,cuisinier:sTarget.Cuisinier});
          call('setSoupersBatch',[batch]);
        } else { // déplacer vers jour libre
          DATA.soupers.push({Date:target,RecetteID:sFrom.RecetteID,Cuisinier:sFrom.Cuisinier});
          DATA.soupers=DATA.soupers.filter(function(x){return x.Date!==from;});
          call('setSouper',[target,sFrom.RecetteID,sFrom.Cuisinier]);
          call('retirerSouper',[from]);
        }
        render();
      }
    });
  });
  // --- ingrédients entre rayons ---
  qall('[data-draging]').forEach(function(el){
    el.addEventListener('dragstart',function(e){DRAG={type:'ing',id:el.getAttribute('data-draging')};el.classList.add('dragging');try{e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',DRAG.id);}catch(x){}});
    el.addEventListener('dragend',function(){el.classList.remove('dragging');DRAG=null;qall('.dropray').forEach(function(d){d.classList.remove('dragover');});});
  });

/* ============ Autocomplete ============ */
function acWidget(container,placeholder,onPick,allowCreate){
  container.innerHTML='<div class="ac"><input class="ac-inp" placeholder="'+esc(placeholder)+'" autocomplete="off"><div class="ac-list hide"></div></div>';
  var inp=container.querySelector('.ac-inp'),list=container.querySelector('.ac-list');
  var picking=false; // vrai pendant qu'on touche un item (empêche la fermeture par blur)
  function sheetOf(){return container.closest('.sheet');}
  function pick(nm,ray){close();onPick(nm,ray);}
  function refresh(){
    var q=inp.value.trim(),nq=norm(q),cat=catalogue();
    var matches=nq?cat.filter(function(c){return norm(c.Ingredient).indexOf(nq)>=0;}):cat;
    var html='';
    matches.slice(0,40).forEach(function(c){html+='<div class="ac-item" data-nm="'+esc(c.Ingredient)+'" data-ray="'+esc(c.Rayon)+'"><span class="nm">'+esc(c.Ingredient)+'</span><span class="ray">'+esc(c.Rayon)+'</span></div>';});
    var exact=cat.some(function(c){return norm(c.Ingredient)===nq;});
    if(allowCreate&&q&&!exact)html+='<div class="ac-new" data-create="'+esc(q)+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>Créer « '+esc(q)+' »</div>';
    if(!html)html='<div class="ac-item muted">Aucun résultat</div>';
    list.innerHTML=html;list.classList.remove('hide');
    var sh=sheetOf();if(sh)sh.classList.add('tall');
    // tap fiable sur iOS sans bloquer le scroll : on capture mousedown (souris) et on suit touchstart→touchend (tactile)
    function attach(el,act){
      el.addEventListener('mousedown',function(ev){ev.preventDefault();picking=true;act();});
      var sx=0,sy=0,moved=false;
      el.addEventListener('touchstart',function(ev){var t=ev.touches[0];sx=t.clientX;sy=t.clientY;moved=false;},{passive:true});
      el.addEventListener('touchmove',function(ev){var t=ev.touches[0];if(Math.abs(t.clientX-sx)>8||Math.abs(t.clientY-sy)>8)moved=true;},{passive:true});
      el.addEventListener('touchend',function(ev){if(!moved){ev.preventDefault();picking=true;act();}},{passive:false});
    }
    list.querySelectorAll('[data-nm]').forEach(function(it){
      attach(it,function(){pick(it.getAttribute('data-nm'),it.getAttribute('data-ray'));});
    });
    var cr=list.querySelector('[data-create]');
    if(cr){
      attach(cr,function(){var val=cr.getAttribute('data-create');close();promptNewIngredient(val,function(nom,ray){onPick(nom,ray);});});
    }
  }
  function close(){list.classList.add('hide');var sh=sheetOf();if(sh)sh.classList.remove('tall');}
  inp.onfocus=refresh;inp.oninput=refresh;
  inp.onblur=function(){setTimeout(function(){if(!picking)close();picking=false;},200);};
  return inp;
}

    EDIT_RID=null;closeSheet();toast('Recette modifiée');render();return;
  }
  var id=cid('R');DATA.recettes.push({RecetteID:id,Nom:nom,Portions:portions||4,Notes:'',Types:types.join(', '),types:types,etapes:REC_STEPS.slice(),lastCooked:''});ings.forEach(function(ing){DATA.ingredients.push({RecetteID:id,Ingredient:ing.ingredient,Quantite:fmtNum(ing.quantite),Unite:ing.unite,Rayon:ing.rayon});if(!DATA.catalogue.some(function(c){return norm(c.Ingredient)===norm(ing.ingredient);}))DATA.catalogue.push({Ingredient:ing.ingredient,Rayon:ing.rayon});});call('ajouterRecette',[{id:id,nom:nom,portions:portions,notes:'',types:types,etapes:REC_STEPS,ingredients:ings}]);closeSheet();toast('Recette enregistrée');render();}

/* ============ Ajout manuel épicerie ============ */
function openManuel(){showSheet('Ajouter à l\'épicerie','<label>Ingrédient</label><div id="mAc" style="margin-bottom:14px"></div><div id="mPicked" class="hide"><div class="card" style="margin-bottom:14px"><div class="row"><div class="grow"><div class="mealname" id="mNom" style="font-size:15px"></div><div class="cook" id="mRay"></div></div></div></div><div style="display:flex;gap:8px;margin-bottom:6px;align-items:flex-start"><input id="mQty" inputmode="decimal" placeholder="Qté" style="flex:.8"><div style="flex:1.4">'+uniteSelectHtml('mu','')+'</div></div><button class="btn" id="mSave" style="margin-top:10px">Ajouter à la liste</button></div>',true);var picked={nom:'',ray:''};acWidget(document.getElementById('mAc'),'Chercher ou créer un ingrédient…',function(nom,ray){picked.nom=nom;picked.ray=ray;document.getElementById('mNom').textContent=nom;document.getElementById('mRay').textContent='Rayon : '+ray;document.getElementById('mPicked').classList.remove('hide');bindUniteSelect('mu');setTimeout(function(){document.getElementById('mQty').focus();},60);},true);document.getElementById('mSave').onclick=function(){if(!picked.nom){alert('Choisis un ingrédient');return;}var q=document.getElementById('mQty').value.replace(',','.')||0,u=uniteSelectVal('mu');var id=cid('E');DATA.epicerie.push({ListeID:id,Ingredient:picked.nom,Quantite:fmtNum(q),Unite:u,Rayon:picked.ray,Source:'manuel',Coche:false});call('ajouterItemEpicerie',[id,picked.nom,q,u,picked.ray]);closeSheet();render();};}

/* ============ Ajout liste ============ */
function openAddListe(){
  showSheet('Nouvelle liste','<div class="field"><label>Nom de la liste</label><input id="nl-nom" placeholder="Ex. Costco, Pharmacie, Quincaillerie…"></div><button class="btn" id="nl-save">Créer la liste</button>',true);
  document.getElementById('nl-save').onclick=function(){var n=document.getElementById('nl-nom').value.trim();if(!n){alert('Nom requis');return;}var id=cid('L');DATA.listes.push({ListeID:id,Nom:n,Type:'custom'});curListe=id;call('creerListe',[id,n,'custom']);closeSheet();render();};
}

/* ============ Listes rapides : créer / modifier ============ */
function openAddRapide(){
  showSheet('Nouvelle liste rapide','<div class="field"><label>Nom de la liste</label><input id="qr-nom" placeholder="Ex. Déjeuner, Collations, Produits ménagers…"></div><button class="btn" id="qr-save">Créer la liste</button>',true);
  document.getElementById('qr-save').onclick=function(){var n=document.getElementById('qr-nom').value.trim();if(!n){alert('Nom requis');return;}var id=cid('QR');DATA.listesRapides.push({RapideID:id,Nom:n});call('creerListeRapide',[id,n]);closeSheet();render();setTimeout(function(){openEditRapide(id);},120);};
}
function openEditRapide(rid){
  function body(){
    var l=(DATA.listesRapides||[]).filter(function(x){return String(x.RapideID)===String(rid);})[0];
    var items=(DATA.listesRapidesItems||[]).filter(function(i){return String(i.RapideID)===String(rid);});
    var h='<div class="field"><label>Nom de la liste</label><input id="qre-nom" value="'+esc(l?l.Nom:'')+'"></div>';
    h+='<label>Items de la liste</label><div id="qre-items">';
    if(!items.length)h+='<div class="muted small" style="margin-bottom:8px">Aucun item. Ajoute-en ci-dessous.</div>';
    items.forEach(function(it){h+='<div class="ingrow"><div class="top"><span class="nm">'+esc(it.Ingredient)+'</span><span class="ray">'+esc(it.Rayon)+'</span><span class="small muted" style="margin-left:auto">'+esc(fmtNum(it.Quantite))+' '+esc(it.Unite)+'</span><span class="rm clk" data-qrrm="'+esc(it.ItemID)+'" style="margin-left:8px">&times;</span></div></div>';});
    h+='</div><label style="margin-top:6px">Ajouter un item</label><div id="qre-ac"></div><div id="qre-rl" class="small muted" style="margin-top:6px"></div><div id="qre-qty" class="hide" style="display:flex;gap:8px;margin-top:8px;align-items:center"><input id="qre-q" inputmode="decimal" placeholder="Qté" style="flex:.7"><select id="qre-u" style="flex:1.3">'+(['<option value="">—</option>'].concat(UNITES.map(function(u){return '<option>'+esc(u)+'</option>';})).join(''))+'</select><button class="btn sm" id="qre-add" style="white-space:nowrap">Ajouter</button></div>';
    h+='<button class="btn danger" id="qre-del" style="margin-top:16px">Supprimer cette liste</button>';
    return h;
  }
  showSheet('Modifier la liste rapide',body(),true);
  rebindEditRapide(rid);
}
function rebindEditRapide(rid){
  var nomInp=document.getElementById('qre-nom');
  if(nomInp)nomInp.onchange=function(){var n=nomInp.value.trim();if(!n)return;var l=(DATA.listesRapides||[]).filter(function(x){return String(x.RapideID)===String(rid);})[0];if(l)l.Nom=n;call('renommerListeRapide',[rid,n]);};
  qall('[data-qrrm]').forEach(function(el){el.onclick=function(){var iid=el.getAttribute('data-qrrm');DATA.listesRapidesItems=DATA.listesRapidesItems.filter(function(x){return String(x.ItemID)!==iid;});call('retirerItemRapide',[iid]);refreshEditRapide(rid);};});
  var picked={nom:'',ray:''};
  acWidget(document.getElementById('qre-ac'),'Chercher ou créer un ingrédient…',function(nom,ray){picked.nom=nom;picked.ray=ray;var inp=document.querySelector('#qre-ac .ac-inp');if(inp)inp.value=nom;document.getElementById('qre-qty').classList.remove('hide');var rl=document.getElementById('qre-rl');if(rl)rl.textContent='Rayon : '+ray;setTimeout(function(){document.getElementById('qre-q').focus();},50);},true);
  var addB=document.getElementById('qre-add');
  if(addB)addB.onclick=function(){if(!picked.nom){toast('Choisis un ingrédient');return;}var q=document.getElementById('qre-q').value.replace(',','.')||1,u=document.getElementById('qre-u').value;var iid=cid('QI');DATA.listesRapidesItems.push({ItemID:iid,RapideID:rid,Ingredient:picked.nom,Quantite:fmtNum(q),Unite:u,Rayon:picked.ray});call('ajouterItemRapide',[iid,rid,picked.nom,q,u,picked.ray]);picked.nom='';refreshEditRapide(rid);};
  var delB=document.getElementById('qre-del');
  if(delB)delB.onclick=function(){if(!confirm('Supprimer cette liste rapide ?'))return;DATA.listesRapides=DATA.listesRapides.filter(function(x){return String(x.RapideID)!==String(rid);});DATA.listesRapidesItems=DATA.listesRapidesItems.filter(function(x){return String(x.RapideID)!==String(rid);});call('supprimerListeRapide',[rid]);closeSheet();render();};
}
function refreshEditRapide(rid){
  // reconstruire le contenu du modal stacké sans le fermer
  var l=(DATA.listesRapides||[]).filter(function(x){return String(x.RapideID)===String(rid);})[0];
  var items=(DATA.listesRapidesItems||[]).filter(function(i){return String(i.RapideID)===String(rid);});
  var cont=document.getElementById('qre-items');
  if(cont){var h='';if(!items.length)h+='<div class="muted small" style="margin-bottom:8px">Aucun item. Ajoute-en ci-dessous.</div>';items.forEach(function(it){h+='<div class="ingrow"><div class="top"><span class="nm">'+esc(it.Ingredient)+'</span><span class="ray">'+esc(it.Rayon)+'</span><span class="small muted" style="margin-left:auto">'+esc(fmtNum(it.Quantite))+' '+esc(it.Unite)+'</span><span class="rm clk" data-qrrm="'+esc(it.ItemID)+'" style="margin-left:8px">&times;</span></div></div>';});cont.innerHTML=h;}
  var qty=document.getElementById('qre-qty');if(qty){qty.classList.add('hide');document.getElementById('qre-q').value='';document.getElementById('qre-u').value='';}
  var acInp=document.querySelector('#qre-ac .ac-inp');if(acInp)acInp.value='';
  var rl=document.getElementById('qre-rl');if(rl)rl.textContent='';
  // re-attacher seulement les suppressions d'items (le reste reste actif)
  qall('[data-qrrm]').forEach(function(el){el.onclick=function(){var iid=el.getAttribute('data-qrrm');DATA.listesRapidesItems=DATA.listesRapidesItems.filter(function(x){return String(x.ItemID)!==iid;});call('retirerItemRapide',[iid]);refreshEditRapide(rid);};});
  render();
}

/* ============ Modal ============ */
function showSheet(title,inner,stacked){var id=stacked?'ov2':'ov';var old=document.getElementById(id);if(old)old.remove();var o=document.createElement('div');o.className='overlay';o.id=id;if(stacked)o.style.zIndex='70';o.innerHTML='<div class="sheet"><div class="grab"></div><div class="shd"><span class="t">'+esc(title)+'</span><span class="x clk">&times;</span></div>'+inner+'</div>';o.onclick=function(e){if(e.target===o)o.remove();};document.body.appendChild(o);o.querySelector('.x').onclick=function(){o.remove();};}
function closeSheet(){var o2=document.getElementById('ov2');if(o2){o2.remove();return;}var o=document.getElementById('ov');if(o)o.remove();}

/* ============ Init ============ */
qall('.side-item,.mobilenav .nv').forEach(function(n){n.onclick=function(){setTab(n.getAttribute('data-tab'));};});
document.getElementById('fab').onclick=function(){if(TAB==='recettes')openRecette();};
document.getElementById('sideNew').onclick=function(){setTab('recettes');openRecette();};
qall('.side-item,.mobilenav .nv').forEach(function(n){n.classList.toggle('on',n.getAttribute('data-tab')===TAB);});
setTimeout(hideSplash,6000);
// Enregistre le Service Worker (offline) — seulement quand l'app est hébergée ailleurs (pas dans l'iframe Apps Script)
if(HOSTED && 'serviceWorker' in navigator){
  var swRefreshed=false;
  // Quand un nouveau service worker prend le contrôle → recharge pour servir la nouvelle version
  navigator.serviceWorker.addEventListener('controllerchange',function(){
    if(swRefreshed)return;swRefreshed=true;location.reload();
  });
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').then(function(reg){
      // vérifie périodiquement s'il y a une mise à jour
      if(reg&&reg.update){setInterval(function(){reg.update();},60000);}
    }).catch(function(){});
  });
}
load();
</script>
